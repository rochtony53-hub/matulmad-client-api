services:
  - type: web
    name: matulmad-client-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORE_API_BASE
        value: https://sms-gateway-admin-backend-vw8p.onrender.com
      - key: CORE_API_TOKEN
        sync: false
      - key: PAYMENT_WEBVIEW_BASE
        value: https://payment-webview.vercel.app
